# VibeCart Local Development Environment
# Includes Next.js app and Supabase infrastructure

services:
  # Next.js Application
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    container_name: vibecart-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Client-side URL (browser accesses via host's localhost)
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
      # Server-side URL (container accesses via Docker network)
      SUPABASE_URL: http://kong:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_DEFAULT_LOCALE: ar-MA
      # Instagram OAuth
      INSTAGRAM_APP_ID: "${INSTAGRAM_APP_ID:-}"
      INSTAGRAM_APP_SECRET: "${INSTAGRAM_APP_SECRET:-}"
      INSTAGRAM_REDIRECT_URI: "${INSTAGRAM_REDIRECT_URI:-http://localhost:3000/api/auth/instagram/callback}"
      INSTAGRAM_TOKEN_ENCRYPTION_KEY: "${INSTAGRAM_TOKEN_ENCRYPTION_KEY:-}"
    volumes:
      - ../src:/app/src
      - ../public:/app/public
      - ../messages:/app/messages
    depends_on:
      kong:
        condition: service_healthy

  # PostgreSQL Database
  db:
    image: supabase/postgres:15.1.1.78
    container_name: vibecart-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      JWT_EXP: 3600
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./volumes/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Supabase Auth (GoTrue)
  auth:
    image: supabase/gotrue:v2.143.0
    container_name: vibecart-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:8000

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:postgres@db:5432/postgres

      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"

      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long

      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@localhost
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_SENDER_NAME: VibeCart

      # Phone/SMS Configuration
      GOTRUE_EXTERNAL_PHONE_ENABLED: "true"
      GOTRUE_SMS_AUTOCONFIRM: "${SMS_AUTOCONFIRM:-true}"
      GOTRUE_SMS_PROVIDER: "${SMS_PROVIDER:-twilio}"
      GOTRUE_SMS_TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID:-}"
      GOTRUE_SMS_TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:-}"
      GOTRUE_SMS_TWILIO_MESSAGE_SERVICE_SID: "${TWILIO_MESSAGE_SERVICE_SID:-}"

      # Google OAuth Configuration
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "${GOOGLE_OAUTH_ENABLED:-false}"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOTRUE_EXTERNAL_GOOGLE_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: "http://localhost:8000/auth/v1/callback"

  # Supabase REST API (PostgREST)
  rest:
    image: postgrest/postgrest:v12.0.1
    container_name: vibecart-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3002:3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_USE_LEGACY_GUCS: "false"

  # Supabase Realtime
  realtime:
    image: supabase/realtime:v2.25.66
    container_name: vibecart-realtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"

  # Supabase Storage (optional - has migration issues, not needed for core functionality)
  storage:
    image: supabase/storage-api:v0.43.11
    container_name: vibecart-storage
    restart: unless-stopped
    profiles:
      - storage
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    ports:
      - "5001:5000"
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      DATABASE_URL: postgres://supabase_storage_admin:postgres@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - storage_data:/var/lib/storage

  # Kong API Gateway
  kong:
    image: kong:2.8.1
    container_name: vibecart-kong
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_started
      rest:
        condition: service_started
    ports:
      - "8000:8000"
      - "8443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./volumes/kong/kong.yml:/var/lib/kong/kong.yml:ro

  # Inbucket (Email testing)
  inbucket:
    image: inbucket/inbucket:3.0.3
    container_name: vibecart-inbucket
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "2500:2500"
    profiles:
      - tools

  # pgAdmin (Database GUI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vibecart-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vibecart.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools

  # ngrok tunnel for Instagram OAuth (exposes localhost to internet)
  # Get your free auth token at: https://dashboard.ngrok.com/get-started/your-authtoken
  # Get a free static domain at: https://dashboard.ngrok.com/cloud-edge/domains
  ngrok:
    image: ngrok/ngrok:latest
    container_name: vibecart-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "http://app:3000"
      - "--domain=${NGROK_DOMAIN:-}"
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN:-}"
    ports:
      - "4040:4040"  # ngrok web interface
    depends_on:
      - app
    profiles:
      - ngrok

volumes:
  db_data:
  storage_data:
